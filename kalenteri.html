<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bändikalenteri</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ee;--surface:#ffffff;--border:#e0dcd4;--border-strong:#c8c2b8;
  --text:#1a1814;--muted:#7a756c;
  --treeni:#085041;--treeni-bg:#e1f5ee;--treeni-bd:#a8d8bc;
  --keikka:#993c1d;--keikka-bg:#faece7;--keikka-bd:#f0b89a;
  --poissaolo:#3d3494;--poissaolo-bg:#eceafc;--poissaolo-bd:#b8b4f0;
  --accent:#3d3494;--accent-bg:#eceafc;
  --r:8px;--rl:12px
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem}
.container{max-width:700px;margin:0 auto}
header{display:flex;align-items:center;gap:12px;margin-bottom:2rem;flex-wrap:wrap}
.logo{width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
h1{font-size:20px;font-weight:500;letter-spacing:-.3px}
.badge-shared{font-size:11px;font-weight:500;background:var(--accent-bg);color:var(--accent);border-radius:20px;padding:3px 10px;border:.5px solid #b8b4f0}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#888;margin-right:5px;transition:background .3s}
.sync-dot.ok{background:#1D9E75}
.sync-dot.err{background:#D85A30}
.month-nav{display:flex;align-items:center;gap:8px;margin-left:auto}
.month-label{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;min-width:150px;text-align:center}
.nav-btn{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:background .15s}
.nav-btn:hover{background:var(--border)}
.cal-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1.25rem}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dh{text-align:center;font-size:11px;font-weight:500;color:var(--muted);padding:4px 0 8px;letter-spacing:.05em;text-transform:uppercase}
.day{height:72px;overflow:hidden;border-radius:var(--r);border:.5px solid var(--border);padding:5px;cursor:pointer;background:var(--surface);transition:background .1s}
.day:hover{background:var(--bg)}
.day.empty{border:none;background:transparent;cursor:default;pointer-events:none}
.day.today{border-color:var(--accent);border-width:1.5px}
.day.selected{background:var(--bg);border-color:var(--border-strong)}
.day-num{font-size:12px;color:var(--muted);margin-bottom:3px;font-family:'DM Mono',monospace}
.day.today .day-num{color:var(--accent);font-weight:500}
.ev-badge{font-size:9px;font-weight:500;border-radius:3px;padding:1px 4px;display:block;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-badge.treeni{background:var(--treeni-bg);color:var(--treeni)}
.ev-badge.keikka{background:var(--keikka-bg);color:var(--keikka)}
.ev-badge.poissaolo{background:var(--poissaolo-bg);color:var(--poissaolo)}
.panel{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1.25rem}
.panel-title{font-size:14px;font-weight:500;margin-bottom:1rem;letter-spacing:-.2px}
.no-events{font-size:14px;color:var(--muted);padding:4px 0}
.tabs{display:flex;gap:4px;margin-bottom:14px}
.tab{flex:1;height:32px;border:0.5px solid var(--border-strong);border-radius:var(--r);background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.tab.active.keikka{background:var(--keikka-bg);color:var(--keikka);border-color:var(--keikka-bd)}
.tab.active.treeni{background:var(--treeni-bg);color:var(--treeni);border-color:var(--treeni-bd)}
.tab.active.poissaolo{background:var(--poissaolo-bg);color:var(--poissaolo);border-color:var(--poissaolo-bd)}
.ev-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border)}
.ev-item:last-child{border-bottom:none}
.ev-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.ev-dot.treeni{background:var(--treeni)}
.ev-dot.keikka{background:var(--keikka)}
.ev-dot.poissaolo{background:var(--poissaolo)}
.ev-info{flex:1}
.ev-title{font-size:14px;font-weight:500}
.ev-time{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.ev-tag{font-size:10px;font-weight:500;border-radius:3px;padding:1px 6px;margin-top:3px;display:inline-block}
.ev-tag.treeni{background:var(--treeni-bg);color:var(--treeni)}
.ev-tag.keikka{background:var(--keikka-bg);color:var(--keikka)}
.ev-tag.poissaolo{background:var(--poissaolo-bg);color:var(--poissaolo)}
.ev-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:2px 6px;border-radius:4px;transition:color .15s,background .15s}
.ev-del:hover{color:var(--keikka);background:var(--keikka-bg)}
.ev-edit{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 6px;border-radius:4px;transition:color .15s,background .15s;white-space:nowrap}
.ev-edit:hover{color:var(--accent);background:var(--accent-bg)}
.ev-pencil{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 6px;border-radius:4px;transition:color .15s,background .15s}
.ev-pencil:hover{color:var(--accent);background:var(--accent-bg)}
.ev-actions{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.add-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.add-btn{padding:10px 14px;border:.5px dashed var(--border-strong);border-radius:var(--r);background:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;text-align:left;transition:background .15s,color .15s}
.add-btn:hover{background:var(--bg);color:var(--text)}
.legend{display:flex;gap:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.ldot{width:8px;height:8px;border-radius:50%}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(20,18,14,.5);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--rl);border:.5px solid var(--border);padding:1.5rem;width:100%;max-width:360px;animation:sup .15s ease}
@keyframes sup{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-size:16px;font-weight:500;margin-bottom:1.25rem}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;letter-spacing:.03em}
.field input,.field select{width:100%;height:38px;border:.5px solid var(--border-strong);border-radius:var(--r);padding:0 10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.type-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.type-btn{height:40px;border:.5px solid var(--border-strong);border-radius:var(--r);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s}
.type-btn.active.treeni{background:var(--treeni-bg);color:var(--treeni);border-color:var(--treeni-bd);font-weight:500}
.type-btn.active.keikka{background:var(--keikka-bg);color:var(--keikka);border-color:var(--keikka-bd);font-weight:500}
.type-btn.active.poissaolo{background:var(--poissaolo-bg);color:var(--poissaolo);border-color:var(--poissaolo-bd);font-weight:500}
.date-range{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-footer{display:flex;gap:8px;margin-top:18px;align-items:center}
.btn-save{flex:1;height:40px;background:var(--text);color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-save:hover{opacity:.85}
.btn-cancel{height:40px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;padding:0 8px}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(20,18,14,.5);z-index:200;align-items:center;justify-content:center;padding:1rem}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--surface);border-radius:var(--rl);border:.5px solid var(--border);padding:1.5rem;max-width:300px;width:100%;text-align:center}
.confirm-box p{font-size:14px;color:var(--muted);margin-bottom:1.25rem;line-height:1.5}
.confirm-box strong{display:block;font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px}
.btn-del-confirm{height:38px;background:var(--keikka-bg);color:var(--keikka);border:.5px solid var(--keikka-bd);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;padding:0 20px}
.btn-del-cancel{height:38px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--muted);cursor:pointer;padding:0 12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:13px;padding:8px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:300}
.toast.show{opacity:1}
.member-pills{display:flex;flex-wrap:wrap;gap:6px}
.member-pill{padding:5px 12px;border:.5px solid var(--border-strong);border-radius:20px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif}
.member-pill.active{background:var(--poissaolo-bg);color:var(--poissaolo);border-color:var(--poissaolo-bd);font-weight:500}
.absence-members{font-size:12px;color:var(--poissaolo);margin-top:2px}
</style>
</head>

<script>
const FIREBASE_URL = 'https://bandikalenteri-4a8e5-default-rtdb.europe-west1.firebasedatabase.app';
const MEMBERS = ['Jani','Jarkko','Konsta','Rane','Sami'];
const MONTHS = ['tammikuu','helmikuu','maaliskuu','huhtikuu','toukokuu','kesäkuu','heinäkuu','elokuu','syyskuu','lokakuu','marraskuu','joulukuu'];

let now=new Date(), curYear=now.getFullYear(), curMonth=now.getMonth();
let activeTab='keikka';
let selectedDay=null, selectedType='treeni', pendingDeleteId=null;
let modalMode='tapahtuma', selectedMembers=[];
let events=[];

function setSyncStatus(ok){
  document.getElementById('sync-dot').className='sync-dot '+(ok?'ok':'err');
  document.getElementById('sync-label').textContent=ok?'Yhteinen':'Ei yhteyttä';
}

async function fetchEvents(){
  try{
    const r=await fetch(FIREBASE_URL+'/events.json');
    if(!r.ok)throw new Error();
    const data=await r.json();
    events=data?Object.entries(data).map(([id,v])=>({...v,_fbid:id})):[];
    setSyncStatus(true);
  }catch(e){setSyncStatus(false);events=[];}
  render();
}

async function addEvent(ev){
  try{
    const r=await fetch(FIREBASE_URL+'/events.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(ev)});
    if(!r.ok)throw new Error();
    showToast('Tallennettu ✓');
    fetchEvents();
  }catch(e){showToast('Virhe tallennuksessa');}
}

async function deleteEvent(fbid){
  try{
    await fetch(FIREBASE_URL+'/events/'+fbid+'.json',{method:'DELETE'});
    showToast('Poistettu');
    fetchEvents();
  }catch(e){showToast('Virhe poistamisessa');}
}

function changeMonth(d){
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  selectedDay=null;render();
}

function parseDate(str){
  const [yy,mm,dd]=str.split('-').map(Number);
  return new Date(yy,mm-1,dd);
}

function evsByDate(y,m,d){
  return events.filter(e=>{
    if(e.type==='poissaolo'){
      const start=parseDate(e.date);
      const end=e.enddate?parseDate(e.enddate):start;
      const check=new Date(y,m,d);
      return check>=start&&check<=end;
    }
    const dt=parseDate(e.date);
    return dt.getFullYear()===y&&dt.getMonth()===m&&dt.getDate()===d;
  });
}

function render(){
  document.getElementById('month-label').textContent=MONTHS[curMonth]+' '+curYear;
  const grid=document.getElementById('cal-grid');
  grid.querySelectorAll('.day,.day-empty').forEach(el=>el.remove());
  let sw=new Date(curYear,curMonth,1).getDay();sw=sw===0?6:sw-1;
  const days=new Date(curYear,curMonth+1,0).getDate();
  for(let i=0;i<sw;i++){const e=document.createElement('div');e.className='day empty day-empty';grid.appendChild(e);}
  for(let d=1;d<=days;d++){
    const el=document.createElement('div');el.className='day';
    if(d===now.getDate()&&curMonth===now.getMonth()&&curYear===now.getFullYear())el.classList.add('today');
    if(selectedDay&&selectedDay.d===d&&selectedDay.m===curMonth&&selectedDay.y===curYear)el.classList.add('selected');
    const num=document.createElement('div');num.className='day-num';num.textContent=d;el.appendChild(num);
    const evs=evsByDate(curYear,curMonth,d);
    evs.slice(0,2).forEach(ev=>{
      const b=document.createElement('span');b.className='ev-badge '+ev.type;
      b.textContent=ev.type==='poissaolo'?(ev.members&&ev.members.length?ev.members[0]:'Poissaolo'):ev.desc||ev.type;
      el.appendChild(b);
    });
    if(evs.length>2){const m2=document.createElement('span');m2.className='ev-badge';m2.style.color='var(--muted)';m2.textContent='+'+( evs.length-2);el.appendChild(m2);}
    el.onclick=()=>{selectedDay={d,m:curMonth,y:curYear};render();};
    grid.appendChild(el);
  }
  renderPanel();
}

function buildEventItem(ev){
  const dt=parseDate(ev.date);
  const item=document.createElement('div');item.className='ev-item';
  const dot=document.createElement('div');dot.className='ev-dot '+ev.type;
  const info=document.createElement('div');info.className='ev-info';
  const t=document.createElement('div');t.className='ev-title';
  if(ev.type==='poissaolo'){
    t.textContent=(ev.members&&ev.members.length?ev.members.join(', '):'?')+' — poissa';
  }else{
    t.textContent=ev.desc||(ev.type==='treeni'?'Treeni':'Keikka');
  }
  const sub=document.createElement('div');sub.className='ev-time';
  let dateStr=dt.toLocaleDateString('fi-FI',{weekday:'short',day:'numeric',month:'numeric'});
  if(ev.type==='poissaolo'&&ev.enddate&&ev.enddate!==ev.date){
    const end=parseDate(ev.enddate);
    dateStr+=' – '+end.toLocaleDateString('fi-FI',{day:'numeric',month:'numeric'});
  }else if(ev.time){
    dateStr+=' · klo '+ev.time;
  }
  sub.textContent=dateStr;
  const tag=document.createElement('span');tag.className='ev-tag '+ev.type;
  tag.textContent=ev.type==='poissaolo'?'poissaolo':ev.type;
  info.appendChild(t);info.appendChild(sub);info.appendChild(tag);
  if(ev.setlist){
    const sl=document.createElement('a');
    sl.href=ev.setlist;sl.target='_blank';sl.rel='noopener noreferrer';
    sl.style.cssText='display:inline-block;margin-top:4px;font-size:11px;font-weight:500;color:var(--accent);text-decoration:none;background:var(--accent-bg);padding:2px 8px;border-radius:3px;';
    sl.textContent='📄 Avaa settilista';
    info.appendChild(sl);
  }
  if(ev.notes){
    const nl=document.createElement('div');
    nl.style.cssText='margin-top:5px;font-size:12px;color:var(--muted);white-space:pre-wrap;line-height:1.5;border-left:2px solid var(--border-strong);padding-left:8px;';
    nl.textContent=ev.notes;
    info.appendChild(nl);
  }
  const actions=document.createElement('div');actions.className='ev-actions';
  const del=document.createElement('button');del.className='ev-del';del.innerHTML='×';del.setAttribute('aria-label','Poista');
  del.onclick=()=>confirmDelete(ev);
  actions.appendChild(del);
  // Edit event button
  const pencil=document.createElement('button');pencil.className='ev-pencil';pencil.innerHTML='✏️';pencil.setAttribute('aria-label','Muokkaa tapahtumaa');
  pencil.onclick=()=>openEditModal(ev);
  actions.appendChild(pencil);

  item.appendChild(dot);item.appendChild(info);item.appendChild(actions);
  return item;
}

function setTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(b=>{
    b.classList.remove('active');
    if(b.dataset.tab===tab) b.classList.add('active');
  });
  renderPanel();
}

function clearDaySelection(){
  selectedDay=null;
  render();
}

function renderPanel(){
  const list=document.getElementById('events-list');
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());

  // Tabs always visible
  document.getElementById('upcoming-tabs').style.display='flex';

  // Day panel
  const dayPanel=document.getElementById('day-panel');
  const dayList=document.getElementById('day-events-list');
  if(selectedDay){
    const dt=new Date(selectedDay.y,selectedDay.m,selectedDay.d);
    document.getElementById('day-panel-title').textContent=dt.toLocaleDateString('fi-FI',{weekday:'long',day:'numeric',month:'long'});
    dayPanel.style.display='block';
    dayList.innerHTML='';
    const dayEvs=evsByDate(selectedDay.y,selectedDay.m,selectedDay.d);
    if(dayEvs.length){
      dayEvs.forEach(ev=>dayList.appendChild(buildEventItem(ev)));
    }else{
      const p=document.createElement('p');p.className='no-events';p.textContent='Ei tapahtumia tänä päivänä';dayList.appendChild(p);
    }
  }else{
    dayPanel.style.display='none';
  }

  // Upcoming — filtered by active tab
  const noEvText={'keikka':'Ei tulevia keikkoja','treeni':'Ei tulevia treenejä','poissaolo':'Ei merkittyjä poissaoloja'};
  list.innerHTML='';
  const evs=events
    .filter(e=>parseDate(e.date)>=today && e.type===activeTab)
    .sort((a,b)=>parseDate(a.date)-parseDate(b.date))
    .slice(0,12);
  if(!evs.length){list.innerHTML='<p class="no-events">'+(noEvText[activeTab]||'Ei tapahtumia')+'</p>';return;}
  evs.forEach(ev=>list.appendChild(buildEventItem(ev)));
}

function openModal(mode){
  modalMode=mode;
  selectedMembers=[];
  const ds=selectedDay
    ?`${selectedDay.y}-${String(selectedDay.m+1).padStart(2,'0')}-${String(selectedDay.d).padStart(2,'0')}`
    :new Date().toISOString().split('T')[0];
  document.getElementById('inp-date').value=ds;
  document.getElementById('inp-desc').value='';
  document.getElementById('inp-time').value='18:00';
  document.getElementById('inp-enddate').value=ds;

  if(mode==='poissaolo'){
    document.getElementById('modal-title').textContent='Merkitse poissaolo';
    document.getElementById('field-type').style.display='none';
    document.getElementById('field-time').style.display='none';
    document.getElementById('field-enddate').style.display='block';
    document.getElementById('field-members').style.display='block';
    document.getElementById('inp-desc').placeholder='Lisätietoa (valinnainen)';
    document.getElementById('field-setlist').style.display='none';
    document.getElementById('inp-setlist').value='';
    document.getElementById('field-notes').style.display='none';
    document.getElementById('inp-notes').value='';
    // Rakenna jäsenpillerit
    const pills=document.getElementById('member-pills');
    pills.innerHTML='';
    MEMBERS.forEach(name=>{
      const p=document.createElement('button');
      p.className='member-pill';p.textContent=name;
      p.onclick=()=>toggleMember(name,p);
      pills.appendChild(p);
    });
  }else{
    document.getElementById('modal-title').textContent='Lisää tapahtuma';
    document.getElementById('field-type').style.display='block';
    document.getElementById('field-time').style.display='block';
    document.getElementById('field-enddate').style.display='none';
    document.getElementById('field-members').style.display='none';
    document.getElementById('inp-desc').placeholder='esim. bänditila, Tavastia...';
    document.getElementById('field-setlist').style.display='block';
    document.getElementById('inp-setlist').value='';
    document.getElementById('field-notes').style.display='block';
    document.getElementById('inp-notes').value='';
    setType('treeni');
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

function setType(t){
  selectedType=t;
  ['treeni','keikka'].forEach(tt=>{
    const b=document.getElementById('btn-'+tt);
    b.className='type-btn'+(tt===t?' active '+t:'');
  });
}

function toggleMember(name,el){
  if(selectedMembers.includes(name)){
    selectedMembers=selectedMembers.filter(m=>m!==name);
    el.classList.remove('active');
  }else{
    selectedMembers.push(name);
    el.classList.add('active');
  }
}

async function saveEvent(){
  const date=document.getElementById('inp-date').value;
  if(!date)return;
  let ev;
  if(modalMode==='poissaolo'){
    if(!selectedMembers.length){showToast('Valitse ainakin yksi jäsen');return;}
    const enddate=document.getElementById('inp-enddate').value||date;
    ev={date,enddate,type:'poissaolo',members:selectedMembers,desc:document.getElementById('inp-desc').value.trim(),created:Date.now()};
  }else{
    ev={date,type:selectedType,desc:document.getElementById('inp-desc').value.trim(),time:document.getElementById('inp-time').value,setlist:document.getElementById('inp-setlist').value.trim(),notes:document.getElementById('inp-notes').value.trim(),created:Date.now()};
  }
  closeModal();
  await addEvent(ev);
}

function confirmDelete(ev){
  pendingDeleteId=ev._fbid;
  let label=ev.type==='poissaolo'
    ?(ev.members&&ev.members.length?ev.members.join(', '):'')+' poissaolo'
    :(ev.desc||(ev.type==='treeni'?'Treeni':'Keikka'));
  document.getElementById('confirm-title').textContent=label;
  document.getElementById('confirm-overlay').classList.add('open');
}

function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');pendingDeleteId=null;}

function doDelete(){if(pendingDeleteId)deleteEvent(pendingDeleteId);closeConfirm();}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('confirm-overlay').addEventListener('click',function(e){if(e.target===this)closeConfirm();});

function downloadICS(){
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const evs=events.filter(e=>e.type!=='poissaolo'&&parseDate(e.date)>=today).sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  if(!evs.length){showToast('Ei tulevia tapahtumia');return;}
  const pad=n=>String(n).padStart(2,'0');
  function icsDate(str,time){
    const [y,m,d]=str.split('-').map(Number);
    if(time){
      const [h,mi]=time.split(':').map(Number);
      return `${y}${pad(m)}${pad(d)}T${pad(h)}${pad(mi)}00`;
    }
    return `${y}${pad(m)}${pad(d)}`;
  }
  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Bandikalenteri//FI\r\nCALSCALE:GREGORIAN\r\n';
  evs.forEach(ev=>{
    const uid=ev._fbid+'@bandikalenteri';
    const summary=(ev.type==='treeni'?'Treeni':'Keikka')+(ev.desc?' — '+ev.desc:'');
    const dtstart=ev.time?'DTSTART:'+icsDate(ev.date,ev.time):'DTSTART;VALUE=DATE:'+icsDate(ev.date);
    const dtend=ev.time?'DTEND:'+icsDate(ev.date,ev.time.split(':')[0]+':'+pad(parseInt(ev.time.split(':')[1])+60>59?'00':ev.time.split(':')[1])):'DTEND;VALUE=DATE:'+icsDate(ev.date);
    ics+=`BEGIN:VEVENT\r\nUID:${uid}\r\nSUMMARY:${summary}\r\n${dtstart}\r\n${dtend}\r\nEND:VEVENT\r\n`;
  });
  ics+='END:VCALENDAR';
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='bandikalenteri.ics';a.click();
  showToast('Ladattu ✓');
}

let setlistTarget=null;
let editTarget=null;
let editSelectedType='treeni';
let editSelectedMembers=[];

function openEditModal(ev){
  editTarget=ev;
  document.getElementById('edit-date').value=ev.date||'';
  document.getElementById('edit-desc').value=ev.desc||'';
  document.getElementById('edit-notes').value=ev.notes||'';

  if(ev.type==='poissaolo'){
    document.getElementById('edit-field-type').style.display='none';
    document.getElementById('edit-field-time').style.display='none';
    document.getElementById('edit-field-notes').style.display='none';
    document.getElementById('edit-field-setlist').style.display='none';
    document.getElementById('edit-field-enddate').style.display='block';
    document.getElementById('edit-enddate').value=ev.enddate||ev.date||'';
    document.getElementById('edit-field-members').style.display='block';
    editSelectedMembers=[...(ev.members||[])];
    const pills=document.getElementById('edit-member-pills');
    pills.innerHTML='';
    MEMBERS.forEach(name=>{
      const p=document.createElement('button');
      p.className='member-pill'+(editSelectedMembers.includes(name)?' active':'');
      p.textContent=name;
      p.onclick=()=>{
        if(editSelectedMembers.includes(name)){
          editSelectedMembers=editSelectedMembers.filter(m=>m!==name);
          p.classList.remove('active');
        }else{
          editSelectedMembers.push(name);
          p.classList.add('active');
        }
      };
      pills.appendChild(p);
    });
  }else{
    document.getElementById('edit-field-type').style.display='block';
    document.getElementById('edit-field-time').style.display='block';
    document.getElementById('edit-field-notes').style.display='block';
    document.getElementById('edit-field-enddate').style.display='none';
    document.getElementById('edit-field-members').style.display='none';
    document.getElementById('edit-field-setlist').style.display='block';
    document.getElementById('edit-time').value=ev.time||'18:00';
    document.getElementById('edit-setlist').value=ev.setlist||'';
    editSetType(ev.type||'treeni');
  }
  document.getElementById('edit-overlay').classList.add('open');
}

function closeEditModal(){
  document.getElementById('edit-overlay').classList.remove('open');
  editTarget=null;
}

function editSetType(t){
  editSelectedType=t;
  ['treeni','keikka'].forEach(tt=>{
    const b=document.getElementById('edit-btn-'+tt);
    b.className='type-btn'+(tt===t?' active '+t:'');
  });
}

async function saveEdit(){
  if(!editTarget)return;
  const date=document.getElementById('edit-date').value;
  if(!date)return;
  let updates={date,desc:document.getElementById('edit-desc').value.trim()};
  if(editTarget.type==='poissaolo'){
    updates.enddate=document.getElementById('edit-enddate').value||date;
    updates.members=editSelectedMembers;
  }else{
    updates.type=editSelectedType;
    updates.time=document.getElementById('edit-time').value;
    updates.notes=document.getElementById('edit-notes').value.trim();
    updates.setlist=document.getElementById('edit-setlist').value.trim();
  }
  try{
    await fetch(FIREBASE_URL+'/events/'+editTarget._fbid+'.json',{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(updates)
    });
    showToast('Tallennettu ✓');
    closeEditModal();
    fetchEvents();
  }catch(e){showToast('Virhe tallennuksessa');}
}

document.getElementById('edit-overlay').addEventListener('click',function(e){if(e.target===this)closeEditModal();});

function openSetlistModal(ev){
  setlistTarget=ev;
  document.getElementById('sl-inp').value=ev.setlist||'';
  document.getElementById('setlist-overlay').classList.add('open');
}

function closeSetlistModal(){
  document.getElementById('setlist-overlay').classList.remove('open');
  setlistTarget=null;
}

async function saveSetlist(){
  if(!setlistTarget)return;
  const url=document.getElementById('sl-inp').value.trim();
  try{
    await fetch(FIREBASE_URL+'/events/'+setlistTarget._fbid+'.json',{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({setlist:url})
    });
    showToast(url?'Settilista tallennettu ✓':'Settilista poistettu');
    closeSetlistModal();
    fetchEvents();
  }catch(e){showToast('Virhe tallennuksessa');}
}

document.getElementById('setlist-overlay').addEventListener('click',function(e){if(e.target===this)closeSetlistModal();});

fetchEvents();
setInterval(fetchEvents,20000);
</script>
